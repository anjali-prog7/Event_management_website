<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | College Event</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Peaceful background */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      background-attachment: fixed;
    }

    /* Glass form box */
    .register-box {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
      animation: fadeIn 1s ease-in-out;
    }

    .register-box h2 {
      text-align: center;
      font-weight: 700;
      color: #333;
      margin-bottom: 1.5rem;
    }

    /* Form controls */
    .form-control {
      border-radius: 10px;
      padding: 12px;
    }

    /* Button styling */
    .btn-register {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-register:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      background: linear-gradient(45deg, #2575fc, #6a11cb);
    }

    /* Extra links */
    .extra-links {
      text-align: center;
      margin-top: 15px;
    }

    .extra-links a {
      text-decoration: none;
      font-weight: bold;
      color: #2575fc;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

  <div class="register-box">
    <h2>Register for College Fest 🎉</h2>
    <form>
      <!-- Full Name -->
      <div class="mb-3">
        <label for="fullname" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullname" placeholder="Enter your name" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
      </div>

      <!-- Department -->
      <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select class="form-control" id="department" required>
          <option value="">-- Select Department --</option>
          <option>Computer Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>Management</option>
        </select>
      </div>
 <div class="mb-3">
        <label for="department" class="form-label">Course name</label>
        <select class="form-control" id="department" required>
          <option value="">--  Select Course Name --</option>
          <option>B.tech</option>
          <option>BCA</option>
          <option>M.Tech</option>
          <option>MBA</option>
          <option>B.A</option>
        </select>
      </div>
      <div class="mb-3">
  <label for="event" class="form-label">Event Name</label>
  <select class="form-control" id="event" required>
    <option value="">-- Select Event --</option>
    <option>Technical Quiz</option>
    <option>Coding Contest</option>
    <option>Hackathon</option>
    <option>Dance Competition</option>
    <option>Music Show</option>
    <option>Drama / Skit</option>
    <option>Sports Tournament</option>
    <option>Art & Poster Exhibition</option>
    <option>Debate Competition</option>
    <option>Treasure Hunt</option>
  </select>
</div>
      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Create Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label for="confirmpassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmpassword" placeholder="Re-enter password" required>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-register w-100">Register Now</button>

      <!-- Extra links -->
      <div class="extra-links">
        <p class="mt-3">Already registered? <a href="#">Login here</a></p>
      </div>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
