<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Dashboard — College Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-image:url("bkkk.jpg"); font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      min-height: 100vh;
      background:rgb(44, 33, 33);
      color: #fff;
      padding-top: 30px;
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      margin: 8px 15px;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.2);
    }
    .profile-box {
      background: #fdf9f9;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      text-align: center;
    }
    .profile-box img {
      border-radius: 50%;
      width: 90px;
      height: 90px;
      object-fit: cover;
      margin-bottom: 10px;
    }
   .stats-card {
  background-color: #ffffff !important; /* solid white */
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
.col-sm-4 {
  padding: 0.5rem; /* avoid body showing around card */
}

    .stats-card:hover { transform: translateY(-5px); }
    .event-card {
      border-radius: 15px;
      background-color: #fdf9f9;
      overflow: hidden;
      padding: 10px;
      position: relative;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
      transition: transform .3s;
    }
    .event-card:hover { transform: scale(1.03); }
    .event-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .event-info { padding: 15px; }
    .event-info h6 { margin: 0; font-weight: 600; }
    .col-md-3 col-lg-2 sidebar{
      background-color: black;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    
    <!-- Sidebar -->
    <aside class="col-md-3 col-lg-2 sidebar">
      <h4 class="text-center mb-4">🎓 College Events</h4>
      <a href="#" class="active">Dashboard</a>
      <a href="#">My Events</a>
      <a href="#">Favorites</a>
      <a href="#">Profile</a>
      <a href="#">Logout</a>
    </aside>
    
    <!-- Main -->
    <main class="col-md-9 col-lg-10 p-4">
      
      <!-- Profile -->
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="profile-box">
            <img src="passport user image.jpg" alt="profile">
            <h5>Rahul</h5>
            <p class="text-muted small">rahul@example.com</p>
            <button class="btn btn-outline-primary btn-sm">Edit Profile</button>
          </div>
        </div>
        <div class="col-md-8">
          <div class="row g-3">
            <div class="col-sm-4">
              <div class="stats-card">
                <h4>5</h4>
                <p class="text-muted small">Registered Events</p>
              </div>
            </div>
            <div class="col-sm-4">
              <div class="stats-card">
                <h4>12</h4>
                <p class="text-muted small">Favorites</p>
              </div>
            </div>
            <div class="col-sm-4">
              <div class="stats-card">
                <h4>8</h4>
                <p class="text-muted small">Reviews</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Registered Events -->
<h5 class="mb-3">My Registered Events</h5>
<div class="row g-3">
  <div class="col-md-4">
    <div class="event-card">
      <img src="music night.jpg" alt="event">
      <div class="event-info">
        <h6>Music Night</h6>
        <p class="text-muted small">Oct 10, 2025 • Main Hall</p>
        <button class="btn btn-sm btn-danger">Cancel</button>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="event-card">
      <img src="workshop 1 (1).jpg" alt="event">
      <div class="event-info">
        <h6>Tech Workshop</h6>
        <p class="text-muted small">Sep 12, 2025 • Auditorium</p>
        <button class="btn btn-sm btn-danger">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ✅ New Registered Event -->
  <div class="col-md-4">
    <div class="event-card">
      <img src="food fest 1.jpg" alt="event">
      <div class="event-info">
        <h6>Food Fest</h6>
        <p class="text-muted small">Nov 05, 2025 • College Ground</p>
        <button class="btn btn-sm btn-danger">Cancel</button>
      </div>
    </div>
  </div>
</div>

              
      
    </main>
  </div>
</div>
</body>
</html>
