<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us | College Event Management</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #fce4ec); /* peaceful gradient */
      color: #333;
    }

    .contact-section {
      padding: 80px 20px;
    }

    .contact-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    .contact-title {
      text-align: center;
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 20px;
      color: #305086;
    }

    .form-control, .btn {
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      border: none;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: linear-gradient(45deg, #2575fc, #6a11cb);
      transform: translateY(-2px);
    }

    .contact-info {
      margin-top: 30px;
      text-align: center;
      font-size: 1.1rem;
      color: #555;
    }

    .contact-info p {
      margin: 5px 0;
    }
  </style>
</head>
<body>

  <section class="contact-section">
    <div class="contact-box">
      <h2 class="contact-title">Contact Us 📩</h2>
      <form>
        <div class="mb-3">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Your Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input type="text" class="form-control" id="subject" placeholder="Enter subject" required>
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="4" placeholder="Write your message here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Message</button>
      </form>

      <div class="contact-info">
        <p>📍 College Campus, XYZ City</p>
        <p>📞 ‪+91 9876543210‬</p>
        <p>✉ support@collegefest.com</p>
      </div>
    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
